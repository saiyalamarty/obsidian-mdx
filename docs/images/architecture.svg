<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title description">
  <title id="title">Obsidian MDX plugin architecture</title>
  <desc id="description">An opted-in Markdown note flows through native Reading view or Live Preview, then into a lazy MDX compiler and component registry, and finally into lifecycle-managed Shadow DOM surfaces.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
    <style>
      :root { color-scheme: light dark; }
      .canvas { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .panel-accent { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; }
      .panel-runtime { fill: #ecfeff; stroke: #22d3ee; stroke-width: 2; }
      .panel-surface { fill: #f0fdf4; stroke: #4ade80; stroke-width: 2; }
      .title { fill: #0f172a; font: 700 25px ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #0f172a; font: 650 18px ui-sans-serif, system-ui, sans-serif; }
      .body { fill: #475569; font: 15px ui-sans-serif, system-ui, sans-serif; }
      .code { fill: #4338ca; font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .arrow-fill { fill: #64748b; }
      .caption { fill: #64748b; font: 600 13px ui-sans-serif, system-ui, sans-serif; letter-spacing: .05em; text-transform: uppercase; }
      @media (prefers-color-scheme: dark) {
        .canvas { fill: #09090b; }
        .panel { fill: #18181b; stroke: #3f3f46; }
        .panel-accent { fill: #1e1b4b; stroke: #6366f1; }
        .panel-runtime { fill: #083344; stroke: #0891b2; }
        .panel-surface { fill: #052e16; stroke: #16a34a; }
        .title, .label { fill: #f8fafc; }
        .body { fill: #cbd5e1; }
        .code { fill: #a5b4fc; }
        .arrow { stroke: #94a3b8; }
        .arrow-fill { fill: #94a3b8; }
        .caption { fill: #94a3b8; }
      }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="660" rx="24" />
  <text class="title" x="48" y="52">Native notes, opt-in execution</text>
  <text class="body" x="48" y="79">Markdown stays canonical; React is mounted only into temporary in-memory placeholders.</text>

  <rect class="panel-accent" x="48" y="118" width="260" height="180" rx="18" />
  <text class="caption" x="72" y="150">Source of truth</text>
  <text class="label" x="72" y="184">Ordinary .md note</text>
  <text class="code" x="72" y="218">---</text>
  <text class="code" x="72" y="241">mdx: true</text>
  <text class="code" x="72" y="264">---</text>
  <text class="body" x="170" y="229">Markdown</text>
  <text class="body" x="170" y="252">+ inline JSX</text>

  <path class="arrow" d="M 308 208 C 350 208, 350 170, 392 170" />
  <path class="arrow" d="M 308 208 C 350 208, 350 350, 392 350" />

  <rect class="panel" x="392" y="105" width="322" height="145" rx="18" />
  <text class="caption" x="416" y="137">Reading view</text>
  <text class="label" x="416" y="171">Guarded native bridge</text>
  <text class="body" x="416" y="201">In-memory placeholders → Obsidian’s</text>
  <text class="body" x="416" y="224">Markdown renderer and postprocessors</text>

  <rect class="panel" x="392" y="285" width="322" height="145" rx="18" />
  <text class="caption" x="416" y="317">Live Preview</text>
  <text class="label" x="416" y="351">CodeMirror 6 decorations</text>
  <text class="body" x="416" y="381">Source under the cursor; React widgets</text>
  <text class="body" x="416" y="404">everywhere else; document unchanged</text>

  <path class="arrow" d="M 714 177 C 760 177, 760 249, 806 249" />
  <path class="arrow" d="M 714 357 C 760 357, 760 292, 806 292" />

  <rect class="panel-runtime" x="806" y="155" width="346" height="238" rx="18" />
  <text class="caption" x="830" y="187">Lazy runtime</text>
  <text class="label" x="830" y="221">MDX compiler + registry</text>
  <text class="body" x="830" y="253">Path + content-hash cache</text>
  <text class="body" x="830" y="280">React hooks and local declarations</text>
  <text class="body" x="830" y="307">shadcn/Base UI · Recharts · Lucide</text>
  <text class="body" x="830" y="334">No imports, network, Node, or server</text>
  <text class="body" x="830" y="361">after installation</text>

  <path class="arrow" d="M 979 393 L 979 460" />

  <rect class="panel-surface" x="190" y="460" width="820" height="150" rx="18" />
  <text class="caption" x="214" y="492">Lifecycle boundary</text>
  <text class="label" x="214" y="526">One isolated Shadow DOM surface per mounted region</text>
  <text class="body" x="214" y="557">Obsidian theme variables flow in; Tailwind and component selectors stay contained.</text>
  <text class="body" x="214" y="584">MarkdownRenderChild / widget destruction unmounts React, portals, listeners, and styles.</text>
</svg>
